function cT(){if(VD!==TD)return;const im=iM(),gr={};CL.forEach(item=>{const i2=ist(item.uh,item.um),t2=i2.h*60+i2.m,key=`${fi(i2.h)}:${fi(i2.m)}`;let diff=im-t2;if(diff>720)diff-=1440;if(diff<-720)diff+=1440;if(diff>=0&&diff<1&&!nf[key]){nf[key]=true;if(!CH[item.id]){if(!gr[key])gr[key]=[];gr[key].push(item);}}});Object.entries(gr).forEach(([,items])=>{if(!items.length)return;beep();});const newOD=CL.filter(item=>{if(CH[item.id])return false;const i2=ist(item.uh,item.um),t2=i2.h*60+i2.m;let d=im-t2;if(d>720)d-=1440;return d>10;}).map(i=>i.id);if(JSON.stringify(newOD)!==JSON.stringify(od)){od=newOD;rBn();}_checkAlarms();}
